<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Municipal</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2053df, #6aa3ff);
        }

        .login-box {
            background: #ffffff;
            padding: 45px;
            width: 340px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 {
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .login-box p {
            margin-bottom: 25px;
            color: #7f8c8d;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 12px;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus {
    border-color: #2053df;
    box-shadow: 0 0 8px rgba(32, 83, 223, 0.5);
}

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #2053df, #6aa3ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .footer-text {
            margin-top: 18px;
            font-size: 11px;
            color: #95a5a6;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="login-box">

        

        <h2>Sistema Municipal</h2>
        <p>Gestión inteligente de trámites</p>

        <form method="POST">

            <div class="input-group">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="Ingrese su usuario" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit">Ingresar</button>

        </form>

        <div class="footer-text">
            Versión 1.0 • Proyecto académico ML
        </div>

    </div>

</body>
</html>
